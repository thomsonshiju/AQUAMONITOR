  /* Professional Color Grade - Orange & Zinc */
  --primary: #f97316;
  --primary-hover: #ea580c;
  --primary-glow: rgba(249, 115, 22, 0.4);
  --secondary: #18181b;
  --secondary-light: #27272a;

  --accent-glow: rgba(236, 72, 153, 0.4);

  /* Light Theme Colors */
  --bg-body: #f8fafc;
  --bg-card: #ffffff;
  --bg-card-rgb: 255, 255, 255;
  --text-main: #0f172a;
  --text-muted: #64748b;
  --border-color: #e2e8f0;

  /* Status Colors */
  --success: #10b981;
  --warning: #f59e0b;
  --danger: #ef4444;

  /* Shadows */
  --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
  --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
  --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);

  /* Transitions */
  --transition-fast: 0.15s ease;
  --transition-normal: 0.3s ease;
}

[data-theme='dark'] {
  /* Dark Theme Colors */
  --bg-body: #0f172a;
  --bg-card: #1e293b;
  --bg-card-rgb: 30, 41, 59;
  --text-main: #f1f5f9;
  /* Slate 100 */
  --text-muted: #94a3b8;
  /* Slate 400 */
  --border-color: #334155;
  /* Slate 700 */

  --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.3);
  --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.3);
}

/* Reset & Base Styles */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
  background-color: transparent;
  /* Image support */
  color: var(--text-main);
  line-height: 1.5;
  transition: background-color var(--transition-normal), color var(--transition-normal);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  min-height: 100vh;
  /* iOS Safe Areas */
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
  overflow-x: hidden;
  -webkit-tap-highlight-color: transparent;
  position: relative;
}

body::before {
  content: '';
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: url('/dashboard-bg.jpg') no-repeat center center;
  background-size: cover;
  background-attachment: fixed;
  z-index: -1;
  opacity: 0.12;
  /* Subtle for text readability with wavy pattern */
  pointer-events: none;
  transition: opacity 0.3s ease, filter 0.3s ease;
}

[data-theme='dark'] body::before {
  opacity: 0.2;
  filter: invert(1) brightness(0.6);
  /* Inverts black/white pattern for dark mode */
}

/* Add a subtle glass overlay to the whole body to blend the background image */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at center, transparent 0%, var(--bg-body) 100%);
  opacity: 0.4;
  z-index: -1;
  pointer-events: none;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 1rem;
}

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 0.5rem 1rem;
  border-radius: 0.5rem;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--transition-fast);
  border: none;
  font-size: 0.95rem;
  gap: 0.5rem;
}

.btn-primary {
  background: linear-gradient(135deg, #f97316, #fb923c);

  box-shadow: 0 4px 12px rgba(249, 115, 22, 0.25);
  font-weight: 600;
  border: 1px solid rgba(255, 255, 255, 0.1);
}

.btn-primary:hover {
  background: linear-gradient(135deg, #fb923c, #f97316);

  background: transparent;

}

.btn-outline:hover {
  background-color: var(--bg-card);
  border-color: var(--primary);
  color: var(--primary);
}

  background-color: rgba(var(--bg-card-rgb), 0.7);

  border-radius: 1.25rem;
  /* More rounded like iOS cards */
  padding: 1.25rem;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
  /* Deeper shadow for depth */
  border: 1px solid rgba(var(--bg-card-rgb), 0.3);
  backdrop-filter: blur(12px) saturate(180%);
  -webkit-backdrop-filter: blur(12px) saturate(180%);
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.card:active {
  transform: scale(0.98);

}

  max-width: 430px;
  min-height: 650px;
  z-index: 1;
}

.auth-card-inner {
  position: relative;
  width: 100%;
  height: 100%;
  transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  transform-style: preserve-3d;
}

.auth-card-inner.flipped {
  transform: rotateY(180deg);
}

.auth-card-front,
.auth-card-back {
  position: absolute;
  width: 100%;
  height: auto;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  display: flex;
  flex-direction: column;
}

.auth-card-back {
  transform: rotateY(180deg);
}

.auth-glass-panel {
  background: rgba(245, 241, 235, 0.75);
  /* Matching beige tone */
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  padding: 2.5rem;
  border-radius: 1.5rem;
  border: 1px solid rgba(255, 255, 255, 0.5);
  box-shadow: 0 15px 35px -5px rgba(0, 0, 0, 0.04), 0 5px 15px -5px rgba(0, 0, 0, 0.04);
}

.auth-input-group {
  display: flex;
  flex-direction: column;
  gap: 0.4rem;
}

.auth-label {
  color: #57534e;
  /* Warm stone color */
  font-size: 0.9rem;
  font-weight: 600;
}

.auth-input {
  width: 100%;
  padding: 0.8rem 1rem;
  border-radius: 0.75rem;
  border: 1px solid #e7e5e4;
  background: rgba(255, 255, 255, 0.9);
  color: #44403c;
  font-size: 0.95rem;
  transition: all 0.2s ease;
}

.auth-input:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.1);
}

.auth-btn-primary {
  width: 100%;
  padding: 1rem;
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: 0.75rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
  box-shadow: 0 4px 6px -1px rgba(249, 115, 22, 0.3);
}

.auth-btn-primary:hover {
  background: var(--primary-hover);
  transform: translateY(-1px);
  box-shadow: 0 6px 10px -1px rgba(249, 115, 22, 0.4);
}

.auth-btn-google {
  width: 100%;
  padding: 1rem;
  background: #fff;
  color: #1e293b;
  border: 1px solid #e2e8f0;
  border-radius: 0.75rem;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  transition: all 0.2s ease;
}

.auth-btn-google:hover {
  background: #f8fafc;
  border-color: #cbd5e1;
}

.auth-link {
  color: var(--primary);
  font-weight: 600;
  cursor: pointer;
  background: none;
  border: none;
  padding: 0;
  font-size: inherit;
}

.auth-title {
  font-size: 2.25rem;
  font-weight: 800;
  color: #44403c;
  margin: 0;
  line-height: 1.2;
}

.auth-subtitle {
  color: #78716c;
  font-size: 1rem;
}

/* Admin Toggle Switch */
.admin-toggle-container {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 0.5rem;
  padding: 0.75rem;
  background: rgba(255, 255, 255, 0.5);
  border-radius: 0.75rem;
  border: 1px solid rgba(249, 115, 22, 0.2);
}

.admin-toggle-label {
  font-size: 0.85rem;
  font-weight: 600;
  color: #44403c;
}

.switch {
  position: relative;
  display: inline-block;
  width: 40px;
  height: 20px;
}

.switch input {
  opacity: 0;
  width: 0;
  height: 0;
}

.slider {
  position: absolute;
  cursor: pointer;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background-color: #ccc;
  transition: .4s;
  border-radius: 20px;
}

.slider:before {
  position: absolute;
  content: "";
  height: 14px;
  width: 14px;
  left: 3px;
  bottom: 3px;
  background-color: white;
  transition: .4s;
  border-radius: 50%;
}

input:checked+.slider {
  background-color: var(--primary);
}

input:checked+.slider:before {
  transform: translateX(20px);
}

/* Theme Slider (Brightness Style) */
.theme-toggle-wrapper {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 14px;
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: 30px;
  box-shadow: var(--shadow-sm);
  transition: all 0.3s ease;
}

.theme-toggle-wrapper:hover {
  transform: translateY(-1px);
  box-shadow: var(--shadow-md);
}

.theme-slider-container {
  display: flex;
  align-items: center;
  gap: 8px;
}

.theme-switch-slider {
  position: relative;
  display: inline-block;
  width: 54px;
  height: 10px;
  /* Thin track like the image */
  background: var(--border-color);
  border-radius: 10px;
  cursor: pointer;
  transition: background 0.4s;
}

.theme-switch-slider input {
  opacity: 0;
  width: 0;
  height: 0;
}

.theme-switch-thumb {
  position: absolute;
  top: 50%;
  left: -2px;
  transform: translateY(-50%);
  width: 22px;
  height: 22px;
  background: #fff;
  border-radius: 50%;
  box-shadow: 0 3px 8px rgba(0, 0, 0, 0.15);
  transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  border: 1px solid rgba(0, 0, 0, 0.05);
}

/* Magenta/Pink track when active with 'Running' Color Grade */
.theme-switch-slider:has(input:checked) {
  background: linear-gradient(90deg, #ec4899, #8b5cf6, #ec4899);
  background-size: 200% 100%;
  animation: gradient-run 3s linear infinite;
}

@keyframes gradient-run {
  0% {
    background-position: 100% 0%;
  }

  100% {
    background-position: -100% 0%;
  }
}

input:checked+.theme-switch-thumb {
  transform: translate(36px, -50%);
  box-shadow: 0 0 15px var(--accent-glow);
}

.theme-icon {
  color: var(--text-muted);
  transition: all 0.3s ease;
  filter: drop-shadow(0 0 2px transparent);
}

.theme-icon.active {
  color: var(--accent);
  filter: drop-shadow(0 0 8px var(--accent-glow));
  transform: scale(1.1);
}</style><script src="https://www.googletagmanager.com/gtag/js?l=dataLayer&amp;id=G-M5WTPMLKKR" async=""></script></head>
