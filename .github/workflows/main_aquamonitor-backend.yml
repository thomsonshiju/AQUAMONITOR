name: Build and deploy Node.js app to Azure Web App - aquamonitor-backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '24.x'

      - name: Install backend dependencies
        run: |
          cd server/backend
          npm install

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend
          path: server/backend

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: backend

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_32DB77748F3D465497311E9E82DFE407 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_24C556674C91493E81EFD31E137095F7 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_E06D79B41D7B4F4A8D977BC75F3FE902 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: aquamonitor-backend
          slot-name: Production
          package: .
